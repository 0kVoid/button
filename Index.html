<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soundboard 4</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        h2 { margin-top: 20px; color: #444; font-size: 1rem; letter-spacing: 1px; }

        .container {
            display: grid;
            /* 2 колонки для ровного квадрата */
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 20px 0 40px 0;
        }

        button {
            padding: 25px 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #1e1e1e;
            color: #efefef;
            border: 2px solid #333;
            border-radius: 15px;
            transition: 0.2s;
            outline: none;
            user-select: none; 
        }

        button.active {
            border-color: #ff4757; /* Цвет активной кнопки сменил на красный под стать стоп-кнопке */
            background: #2d1a1c;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        .stop-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81, #7158e2, #ff4757);
            background-size: 300% 300%;
            animation: gradient-move 3s ease infinite;
            border: none;
            color: white;
            width: 100%;
            max-width: 300px;
            padding: 22px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            position: sticky;
            bottom: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button:active { transform: scale(0.92); }
    </style>
</head>
<body>

    <h2>SOUND PANEL</h2>

    <div class="container">
        <button onclick="toggleLoop('sound1.mp3', this)">Метка 1</button>
        <button onclick="toggleLoop('sound2.mp3', this)">Метка 2</button>
        <button onclick="toggleLoop('sound3.mp3', this)">Метка 3</button>
        <button onclick="toggleLoop('sound4.mp3', this)">Метка 4</button>
    </div>

    <button class="stop-btn" onclick="stopAll()">ЗАГЛУШИТЬ</button>

    <script>
        const playingSounds = new Map();

        function toggleLoop(url, btn) {
            if (playingSounds.has(url)) {
                const audio = playingSounds.get(url);
                audio.pause();
                playingSounds.delete(url);
                btn.classList.remove('active');
            } else {
                const audio = new Audio(url);
                audio.loop = true;
                audio.play().catch(e => {
                    console.log("Ошибка: файл не найден");
                });
                playingSounds.set(url, audio);
                btn.classList.add('active');
            }
        }

        function stopAll() {
            playingSounds.forEach(audio => audio.pause());
            playingSounds.clear();
            document.querySelectorAll('.container button').forEach(btn => {
                btn.classList.remove('active');
            });
        }
    </script>

</body>
</html>
